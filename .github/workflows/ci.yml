name: GSAF CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Verilator Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator
      - name: Run lint
        run: make lint

  golden-model:
    name: Golden Model Self-Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run golden model
        run: make golden-test

  simulation:
    name: cocotb Simulation
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator
      - name: Install cocotb
        run: pip install cocotb cocotbext-axi
      - name: Run simulation
        run: make sim
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results
          path: tb/results.xml

  formal:
    name: Formal Verification
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y yosys
      - name: Install SymbiYosys
        run: |
          cd /tmp
          git clone https://github.com/YosysHQ/sby.git
          cd sby
          sudo make install
      - name: Run formal proofs
        run: make formal
